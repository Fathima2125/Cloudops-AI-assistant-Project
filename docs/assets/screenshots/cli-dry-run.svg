  <rect x="24" y="24" width="952" height="472" rx="12" fill="#111827" stroke="#334155"/>
  <text x="42" y="76" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="16">$ python3 scripts/analyze.py --type aws-doc --file aws-questions/lambda-timeout.md --dry-run</text>
  <text x="42" y="130" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="17">CloudOps AI Assistant CLI</text>
