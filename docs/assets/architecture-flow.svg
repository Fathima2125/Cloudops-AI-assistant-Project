<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">CloudOps AI Assistant Architecture Flow</title>
  <desc id="desc">User to Codex CLI to prompts and CLI, then Terraform logs and AWS questions, AWS Documentation MCP, and Markdown reports.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .mcp { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 10; }
      .report { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 10; }
      .text { font-family: Arial, Helvetica, sans-serif; fill: #111827; font-size: 18px; font-weight: 700; }
      .small { font-family: Arial, Helvetica, sans-serif; fill: #374151; font-size: 13px; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="360"/>
  <rect class="box" x="40" y="130" width="130" height="80"/>
  <text class="text" x="105" y="165" text-anchor="middle">User</text>
  <text class="small" x="105" y="188" text-anchor="middle">CloudOps learner</text>

  <rect class="box" x="230" y="130" width="150" height="80"/>
  <text class="text" x="305" y="165" text-anchor="middle">Codex CLI</text>
  <text class="small" x="305" y="188" text-anchor="middle">AI workflow</text>

  <rect class="box" x="440" y="55" width="170" height="80"/>
  <text class="text" x="525" y="90" text-anchor="middle">Prompts</text>
  <text class="small" x="525" y="113" text-anchor="middle">Reusable templates</text>

  <rect class="box" x="440" y="205" width="170" height="80"/>
  <text class="text" x="525" y="240" text-anchor="middle">CLI Helper</text>
  <text class="small" x="525" y="263" text-anchor="middle">Dry-run paths</text>

  <rect class="box" x="670" y="55" width="190" height="80"/>
  <text class="text" x="765" y="88" text-anchor="middle">Inputs</text>
  <text class="small" x="765" y="111" text-anchor="middle">Terraform, logs, AWS questions</text>

  <rect class="mcp" x="670" y="205" width="190" height="80"/>
  <text class="text" x="765" y="238" text-anchor="middle">AWS Docs MCP</text>
  <text class="small" x="765" y="261" text-anchor="middle">Documentation only</text>

  <rect class="report" x="930" y="130" width="210" height="80"/>
  <text class="text" x="1035" y="165" text-anchor="middle">Markdown Reports</text>
  <text class="small" x="1035" y="188" text-anchor="middle">Security, incidents, reliability</text>

  <path class="arrow" d="M170 170 H230"/>
  <path class="arrow" d="M380 160 C405 130, 410 105, 440 95"/>
  <path class="arrow" d="M380 180 C405 210, 410 235, 440 245"/>
  <path class="arrow" d="M610 95 H670"/>
  <path class="arrow" d="M610 245 H670"/>
  <path class="arrow" d="M860 95 C900 105, 910 135, 930 160"/>
  <path class="arrow" d="M860 245 C900 235, 910 205, 930 180"/>
</svg>
